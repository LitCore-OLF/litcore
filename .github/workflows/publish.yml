# .github/workflows/publish.yml
#
# Publishes @litcore/cli to npm on every GitHub Release.
#
# Trigger:
#   Create a GitHub Release (or push a tag vX.Y.Z) to kick this off.
#   The workflow syncs the tag version into package.json automatically,
#   so you never need to manually bump the version before releasing.
#
# Required secret:
#   NPM_TOKEN  — a Granular Access Token from npmjs.com with
#                publish permission scoped to @litcore/cli.
#                Add it at: Settings → Secrets → Actions → New repository secret

name: Publish to npm

on:
  release:
    types: [published]   # fires when you hit "Publish release" on GitHub

  # Also allow manual dispatch for testing the pipeline without a release
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual npm publish)"
        required: false
        default: "false"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Test — always run tests first, fail fast before touching npm
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["18", "20", "22"]   # test the full supported range

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Publish — only runs after all test matrix jobs pass
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test   # gate: all test jobs must be green

    # Only publish on an actual release event, not on manual dry-run dispatches
    # (dry_run input is only set on workflow_dispatch, not on release events)
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Sync the git tag version (e.g. v1.2.3 → 1.2.3) into package.json.
      # This means you only ever bump the version in GitHub Releases, not locally.
      - name: Sync version from git tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"   # strip leading 'v'
          echo "Syncing version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Run tests one final time against the version-bumped package
      - name: Final test run
        run: npm test

      - name: Publish to npm (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true' && github.event_name == 'release'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: github.event_name == 'release'
        run: |
          echo "### ✅ Published \`@litcore/cli@${{ github.event.release.tag_name }}\` to npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with: \`npm install @litcore/cli\`" >> $GITHUB_STEP_SUMMARY
